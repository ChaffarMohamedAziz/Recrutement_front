<div class="details-shell">
  <app-page-hero
    badge="Admin"
    [title]="company.name"
    [subtitle]="company.industry + ' · ' + company.location + ' · ' + company.size"
    theme="admin"
    variant="enterprise"
    [breadcrumbs]="[
      { label: 'Accueil', link: '/home' },
      { label: 'Entreprises', link: '/company-list' },
      { label: 'Details' }
    ]"
    [highlights]="[
      { title: 'Secteur visible', description: 'Retrouvez rapidement le positionnement de l entreprise.', icon: 'briefcase' },
      { title: 'Attractivite', description: 'Visualisez ses points forts et ses avantages en un coup d oeil.', icon: 'spark' },
      { title: 'Postes ouverts', description: 'Accedez directement aux besoins actifs de cette entreprise.', icon: 'chart' }
    ]"
  ></app-page-hero>

  <div class="details-card">
    <div class="content-grid">
      <section class="content-card">
        <h2>A propos</h2>
        <p>{{ company.summary }}</p>
        <div class="tag-row">
          <span class="tag" *ngFor="let item of company.highlights">{{ item }}</span>
        </div>
      </section>

      <section class="content-card">
        <h2>Avantages</h2>
        <ul>
          <li *ngFor="let benefit of company.benefits">{{ benefit }}</li>
        </ul>
      </section>
    </div>

    <section class="content-card jobs-card">
      <h2>Postes ouverts</h2>
      <div class="job-list">
        <article class="job-item" *ngFor="let job of jobs">
          <div>
            <h3>{{ job.title }}</h3>
            <p>{{ job.summary }}</p>
          </div>
          <span>{{ job.contractType }}</span>
        </article>
      </div>
    </section>
  </div>
</div>
