<div class="navbar-area" [class.scrolled]="isScrolled">
  <div class="mobile-nav">
    <a [routerLink]="homeLink" class="logo" (click)="closeMobileMenu()">
      <span class="brand-logo-frame">
        <img src="/Logo_site.png" alt="Smart Recruit" class="brand-logo-image" />
      </span>
    </a>

    <button type="button" class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Ouvrir le menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="main-nav" [class.open]="isMobileMenuOpen">
    <div class="container">
      <nav class="navbar" [class.role-navbar]="isLoggedIn" [class.admin-navbar]="isAdmin" [class.public-navbar]="!isLoggedIn">
        <a class="navbar-brand" [routerLink]="homeLink" (click)="closeMobileMenu()">
          <span class="brand-logo-frame">
            <img src="/Logo_site.png" alt="Smart Recruit" class="brand-logo-image" />
          </span>
        </a>

        <div class="navbar-menu" [class.role-navbar-menu]="isLoggedIn" [class.admin-navbar-menu]="isAdmin" [class.public-navbar-menu]="!isLoggedIn">
          <ul class="navbar-nav" [class.role-navbar-nav]="isLoggedIn" [class.admin-navbar-nav]="isAdmin">
            <li class="nav-item" *ngFor="let item of navItems; trackBy: trackByLink">
              <a
                [routerLink]="item.link"
                routerLinkActive="active"
                class="nav-link"
                [routerLinkActiveOptions]="item.exact ? exactRouteOptions : partialRouteOptions"
                (click)="closeMobileMenu()"
              >
                {{ item.label }}
              </a>
            </li>
          </ul>

          <div class="public-nav-actions" *ngIf="!isLoggedIn">
            <a routerLink="/login" class="nav-auth-link nav-auth-link-secondary" (click)="closeMobileMenu()">
              Se connecter
            </a>
            <a routerLink="/register" class="nav-auth-link nav-auth-link-primary" (click)="closeMobileMenu()">
              Demarrer maintenant
            </a>
          </div>

          <div class="common-btn" *ngIf="isLoggedIn" [class.role-common-btn]="isLoggedIn" [class.admin-common-btn]="isAdmin">
            <button
              *ngIf="isRecruiter || isCandidate"
              type="button"
              class="message-btn"
              aria-label="Messagerie"
              (click)="openMessaging()"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 10.5h10"></path>
                <path d="M7 14h6"></path>
                <path d="M5.5 5.5h13a2.5 2.5 0 0 1 2.5 2.5v7a2.5 2.5 0 0 1-2.5 2.5H11l-4.5 3v-3H5.5A2.5 2.5 0 0 1 3 15V8a2.5 2.5 0 0 1 2.5-2.5Z"></path>
              </svg>
              <span class="message-count" *ngIf="unreadMessagesCount > 0">{{ unreadMessagesCount }}</span>
            </button>

            <button type="button" class="theme-btn" (click)="toggleTheme()" [attr.aria-label]="currentTheme === 'dark' ? 'Activer le mode clair' : 'Activer le mode sombre'">
              <span>{{ currentTheme === 'dark' ? '☀' : '☾' }}</span>
            </button>

            <div class="notify-shell" (click)="$event.stopPropagation()">
              <button type="button" class="notify-btn" aria-label="Notifications" (click)="toggleNotifications($event)">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5.25a4.25 4.25 0 0 0-4.25 4.25v2.27c0 .74-.24 1.47-.69 2.07l-1.12 1.52c-.22.3-.01.72.36.72h11.4c.37 0 .58-.42.36-.72l-1.12-1.52a3.46 3.46 0 0 1-.69-2.07V9.5A4.25 4.25 0 0 0 12 5.25Z"></path>
                  <path d="M10.2 18.2a1.8 1.8 0 0 0 3.6 0"></path>
                  <path d="M12 4v1.25"></path>
                </svg>
                <span class="notify-count" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
              </button>

              <div class="notifications-panel" *ngIf="notificationsOpen">
                <div class="notifications-head">
                  <div>
                    <strong>Notifications</strong>
                    <small>{{ unreadCount }} non lue(s)</small>
                  </div>

                  <button
                    type="button"
                    class="notifications-mark-btn"
                    (click)="markAllNotificationsAsRead($event)"
                    [disabled]="!unreadCount"
                  >
                    Tout lire
                  </button>
                </div>

                <p class="notifications-state" *ngIf="notificationsLoading">Chargement...</p>
                <p class="notifications-state error" *ngIf="!notificationsLoading && notificationsError">{{ notificationsError }}</p>

                <div class="notifications-list" *ngIf="!notificationsLoading && !notificationsError">
                  <button
                    type="button"
                    class="notification-item"
                    *ngFor="let notification of notifications; trackBy: trackByNotificationId"
                    [class.unread]="!notification.lue"
                    (click)="markNotificationAsRead(notification, $event)"
                  >
                    <span class="notification-dot" *ngIf="!notification.lue"></span>
                    <div class="notification-copy">
                      <strong>{{ notification.message }}</strong>
                      <small>{{ notification.dateEnvoi | date:'dd/MM/yyyy HH:mm' }}</small>
                    </div>
                  </button>

                  <div class="notifications-empty" *ngIf="!notifications.length">
                    Aucune notification.
                  </div>
                </div>
              </div>
            </div>

            <div class="profile-menu-shell" (click)="$event.stopPropagation()">
              <button type="button" class="profile-chip profile-chip-button" (click)="toggleProfileMenu($event)" aria-label="Ouvrir le menu profil">
                <span class="profile-avatar">{{ userInitials }}</span>
                <span class="profile-copy">
                  <strong>{{ currentUser?.username || roleLabel }}</strong>
                  <small>{{ roleLabel }}</small>
                </span>
                <span class="profile-caret" [class.open]="profileMenuOpen"></span>
              </button>

              <div class="profile-dropdown" *ngIf="profileMenuOpen">
                <button type="button" class="profile-dropdown-item" (click)="goToChangePassword($event)">
                  Changer le mot de passe
                </button>
                <button type="button" class="profile-dropdown-item danger" (click)="logout()">
                  Deconnexion
                </button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </div>
</div>
