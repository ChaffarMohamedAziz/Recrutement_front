<div class="reset-shell">
  <div class="reset-card">
    <span class="reset-badge">Smart Recruit</span>
    <h1>Definir un nouveau mot de passe</h1>
    <p class="intro">
      Choisissez un nouveau mot de passe pour votre compte. Le lien recu par e-mail reste valable pendant une duree limitee.
    </p>

    <p class="error-box" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success-box" *ngIf="successMessage">{{ successMessage }}</p>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="reset-form" *ngIf="!isSuccess">
      <label class="field">
        <span>Nouveau mot de passe</span>
        <input type="password" formControlName="password" placeholder="Minimum 6 caracteres" />
      </label>

      <label class="field">
        <span>Confirmer le mot de passe</span>
        <input type="password" formControlName="confirmPassword" placeholder="Retapez votre mot de passe" />
      </label>

      <p class="hint" *ngIf="resetPasswordForm.hasError('passwordMismatch')">
        Les deux mots de passe doivent etre identiques.
      </p>

      <button type="submit" class="primary-btn" [disabled]="isSubmitting || !token">
        {{ isSubmitting ? 'VALIDATION...' : 'REINITIALISER LE MOT DE PASSE' }}
      </button>
    </form>

    <div class="action-row">
      <button type="button" class="ghost-btn" (click)="goToLogin()">Aller a la connexion</button>
      <a routerLink="/forgot-password" class="text-link">Demander un nouveau lien</a>
    </div>
  </div>
</div>
