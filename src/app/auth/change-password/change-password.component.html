<section class="change-password-page">
  <div class="change-password-card">
    <div class="card-head">
      <span class="card-kicker">Securite du compte</span>
      <h1>Changer le mot de passe</h1>
      <p>Mettez a jour votre mot de passe pour garder votre compte Smart Recruit bien protege.</p>
    </div>

    <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()" novalidate>
      <label class="field">
        <span>Mot de passe actuel</span>
        <input type="password" formControlName="currentPassword" placeholder="Saisissez votre mot de passe actuel" />
      </label>

      <label class="field">
        <span>Nouveau mot de passe</span>
        <input type="password" formControlName="newPassword" placeholder="Minimum 6 caracteres" />
      </label>

      <label class="field">
        <span>Confirmer le nouveau mot de passe</span>
        <input type="password" formControlName="confirmPassword" placeholder="Retapez le nouveau mot de passe" />
      </label>

      <small class="field-error" *ngIf="changePasswordForm.hasError('passwordMismatch') && changePasswordForm.touched">
        Les mots de passe ne correspondent pas.
      </small>

      <p class="form-message success" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="form-message error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="actions">
        <button type="button" class="secondary-btn" (click)="goBack()">Retour</button>
        <button type="submit" class="primary-btn" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Enregistrement...' : 'Changer le mot de passe' }}
        </button>
      </div>
    </form>
  </div>
</section>
