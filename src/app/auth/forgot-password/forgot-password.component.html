<div class="reset-shell">
  <div class="reset-card">
    <span class="reset-badge">Smart Recruit</span>
    <h1>Mot de passe oublie</h1>
    <p class="intro">
      Saisissez votre adresse e-mail. Si votre compte existe, nous vous enverrons un lien de reinitialisation.
    </p>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="reset-form">
      <label class="field">
        <span>Adresse e-mail</span>
        <input type="email" formControlName="email" placeholder="exemple@domaine.com" />
      </label>

      <p class="success-box" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="error-box" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="primary-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'ENVOI...' : 'ENVOYER LE LIEN' }}
      </button>
    </form>

    <div class="action-row">
      <a routerLink="/login" class="ghost-btn">Retour a la connexion</a>
      <a routerLink="/register" class="text-link">Creer un compte</a>
    </div>
  </div>
</div>
